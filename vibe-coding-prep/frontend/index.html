<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Campus Lost & Found Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

<main class="auth-card">
    <header class="auth-header">
        <h1>Campus Lost &amp; Found</h1>
        <p class="muted">Report it. Find it. Return it.</p>
    </header>

    <!-- Two tabs: Login (default) and Sign up -->
    <div class="tabs" role="tablist">
        <button class="tab active" data-tab="login"  role="tab">Log in</button>
        <button class="tab"        data-tab="signup" role="tab">Sign up</button>
    </div>

    <!-- LOGIN form -->
    <form id="loginForm" class="auth-form">
        <label>Username
            <input type="text" name="username" required autocomplete="username">
        </label>
        <label>Password
            <input type="password" name="password" required autocomplete="current-password">
        </label>
        <button class="btn primary" type="submit">Log in</button>
        <p class="hint">Default admin: <code>admin / admin123</code></p>
    </form>

    <!-- SIGNUP form -->
    <form id="signupForm" class="auth-form hidden">
        <label>Full name
            <input type="text" name="full_name" required>
        </label>
        <label>Username
            <input type="text" name="username" required>
        </label>
        <label>Password (min 6 chars)
            <input type="password" name="password" required minlength="6">
        </label>
        <button class="btn primary" type="submit">Create account</button>
    </form>

    <p id="authMsg" class="msg"></p>
</main>

<script src="app.js"></script>
<script>
// Tab switching ------------------------------------------------------------
const tabs    = document.querySelectorAll('.tab');
const loginF  = document.getElementById('loginForm');
const signupF = document.getElementById('signupForm');
tabs.forEach(t => t.addEventListener('click', () => {
    tabs.forEach(x => x.classList.toggle('active', x === t));
    const isLogin = t.dataset.tab === 'login';
    loginF .classList.toggle('hidden', !isLogin);
    signupF.classList.toggle('hidden',  isLogin);
    msg('');
}));

const msg = (text, ok) => {
    const el = document.getElementById('authMsg');
    el.textContent = text || '';
    el.className = 'msg ' + (ok ? 'ok' : 'err');
};

// LOGIN --------------------------------------------------------------------
loginF.addEventListener('submit', async (ev) => {
    ev.preventDefault();
    const data = Object.fromEntries(new FormData(loginF).entries());
    try {
        const res = await api('/api/auth/login', { method:'POST', body:data });
        Auth.set(res.token, res.user);
        location.href = res.user.role === 'ADMIN' ? 'admin.html' : 'dashboard.html';
    } catch (e) { msg(e.message); }
});

// SIGNUP -------------------------------------------------------------------
signupF.addEventListener('submit', async (ev) => {
    ev.preventDefault();
    const data = Object.fromEntries(new FormData(signupF).entries());
    try {
        await api('/api/auth/signup', { method:'POST', body:data });
        msg('Account created. You can log in now.', true);
        document.querySelector('.tab[data-tab="login"]').click();
    } catch (e) { msg(e.message); }
});

// If already logged in, jump straight to the right page.
if (Auth.token()) {
    const u = Auth.user();
    if (u) location.href = (u.role === 'ADMIN') ? 'admin.html' : 'dashboard.html';
}
</script>

</body>
</html>
